<!DOCTYPE html>
<html>
<head>
  <title>Developer Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="nav">
  <span>🧩 Developer Dashboard</span>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <h2>Upload Snippet</h2>
  <p style="text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:8px;">
    Share your code with the marketplace
  </p>

  <hr class="divider">

  <label class="field-label">Title</label>
  <input id="title" placeholder="e.g. Python bubble sort">

  <label class="field-label">Code</label>
  <textarea id="code" placeholder="Paste your code here..."></textarea>

  <label class="field-label">Price (₹)</label>
  <input id="price" type="number" min="0" placeholder="0 = Free">

  <button onclick="uploadSnippet()">Upload Snippet</button>

  <p id="msg"></p>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/snippet.js"></script>

</body>
</html>
